<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Airbnb Pricing Calculator</title>

<style>
body{
    font-family:Arial,Helvetica,sans-serif;
    background:#f4f4f4;
    margin:40px;
}

.container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 5px 20px rgba(0,0,0,.15);
}

h1{
    text-align:center;
    margin-bottom:25px;
}

button{
    padding:12px 25px;
    font-size:16px;
    cursor:pointer;
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
    text-align:right;
}

th{
    background:#222;
    color:white;
}

tr:nth-child(even){
    background:#f8f8f8;
}

tfoot td{
    font-weight:bold;
    background:#efefef;
}
</style>

</head>

<body>

<div class="container">

<h1>Airbnb Pricing Calculator</h1>

<p>
Sequence:
<strong>1555 → 1666 → 1777 → ... → 5555</strong><br>
Airbnb Host Fee: <strong>18%</strong>
</p>

<button onclick="generateTable()">Generate Pricing Table</button>

<table id="pricingTable">

<thead>
<tr>
<th>Posted Price</th>
<th>Airbnb Fee (18%)</th>
<th>Net Payout</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<script>

const START = 1555;
const END = 5555;
const STEP = 111;
const FEE = 0.18;

function peso(value){
    return "₱" + value.toLocaleString(undefined,{
        minimumFractionDigits:2,
        maximumFractionDigits:2
    });
}

function addRow(tbody, price){

    const fee = price * FEE;
    const payout = price - fee;

    tbody.innerHTML += `
    <tr>
        <td>${peso(price)}</td>
        <td>${peso(fee)}</td>
        <td>${peso(payout)}</td>
    </tr>
    `;
}

function generateTable(){

    const tbody = document.querySelector("#pricingTable tbody");
    tbody.innerHTML="";

    let lastPrice = START;

    for(let price=START; price<=END; price+=STEP){

        addRow(tbody, price);
        lastPrice = price;

    }

    // Force 5555 as final row
    if(lastPrice !== END){

        addRow(tbody, END);

    }

}

generateTable();

</script>

</body>
</html>
