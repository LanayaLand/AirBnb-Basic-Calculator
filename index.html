<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Airbnb Pricing Calculator</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    padding:40px;
}

.container{
    max-width:900px;
    margin:auto;
    background:#fff;
    padding:25px;
    border-radius:10px;
    box-shadow:0 4px 15px rgba(0,0,0,.15);
}

h1{
    text-align:center;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
    text-align:right;
}

th{
    background:#222;
    color:white;
}

tr:nth-child(even){
    background:#f8f8f8;
}
</style>

</head>
<body>

<div class="container">

<h1>Airbnb Pricing Calculator</h1>

<p>
Pricing Pattern:<br>
1111 → 1222 → 1333 → … → 5555
</p>

<table id="pricing">
<thead>
<tr>
<th>Posted Price</th>
<th>18% Airbnb Fee</th>
<th>Net Payout</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<script>

const HOST_FEE = 0.18;

function peso(n){
    return "₱" + n.toLocaleString(undefined,{
        minimumFractionDigits:2,
        maximumFractionDigits:2
    });
}

const tbody=document.querySelector("#pricing tbody");

for(let thousands=1; thousands<=5; thousands++){

    for(let digit=1; digit<=9; digit++){

        let price = thousands*1000 + digit*111;

        if(price>5555) break;

        const fee = price*HOST_FEE;
        const payout = price-fee;

        tbody.innerHTML += `
        <tr>
            <td>${peso(price)}</td>
            <td>${peso(fee)}</td>
            <td>${peso(payout)}</td>
        </tr>`;
    }

}

</script>

</body>
</html>
